name: CI

on:
  push:
  pull_request:

jobs:
  host-tests:
    name: host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build host tests
        run: |
          mkdir -p tests/build
          g++ -DARDUINO=100 -std=c++11 -Wall -Wextra -Werror -I tests/support -I src tests/CountimerHostTests.cpp src/Countimer.cpp -o tests/build/countimer-host-tests
      - name: run host tests
        run: ./tests/build/countimer-host-tests

  lint:
    name: arduino-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/arduino-lint-action@v2
        with:
          project-type: library
          compliance: strict
          library-manager: update

  compile:
    name: compile (${{ matrix.board.fqbn }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: arduino:avr:uno
            platforms: |
              - name: arduino:avr
          - fqbn: esp32:esp32:esp32
            platforms: |
              - name: esp32:esp32
                source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.board.fqbn }}
          platforms: ${{ matrix.board.platforms }}
          libraries: |
            - source-path: ./
          sketch-paths: |
            - examples/Basic
            - examples/Advanced
            - examples/CountimerTest
